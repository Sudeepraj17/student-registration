spring.application.name=backend
# Render injects PORT; Spring Boot must listen on it
server.port=${PORT:8080}

# Supabase Postgres connection - values come from Render env vars (see setup notes)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Supabase's pooler sits in front of Postgres; disable statement caching prep
# to avoid issues with pgbouncer transaction-mode pooling.
spring.datasource.hikari.data-source-properties.prepareThreshold=0
